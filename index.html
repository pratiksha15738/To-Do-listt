<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>React To-Do List</title>

  <!-- React CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
    }

    input {
      width: 70%;
      padding: 8px;
      margin-right: 5px;
    }

    button {
      padding: 8px;
      background: blue;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: darkblue;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 15px;
    }

    li {
      background: #eee;
      margin-bottom: 5px;
      padding: 8px;
      display: flex;
      justify-content: space-between;
      border-radius: 5px;
    }

    .delete {
      background: red;
      padding: 5px;
      border: none;
      color: white;
      cursor: pointer;
    }

    .delete:hover {
      background: darkred;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
  function TodoApp() {
    const [task, setTask] = React.useState("");
    const [tasks, setTasks] = React.useState([]);

    const addTask = () => {
      if (task.trim() === "") return;
      setTasks([...tasks, task]);
      setTask("");
    };

    const deleteTask = (index) => {
      const newTasks = tasks.filter((_, i) => i !== index);
      setTasks(newTasks);
    };

    return (
      <div className="container">
        <h2>To-Do List</h2>

        <input
          type="text"
          value={task}
          onChange={(e) => setTask(e.target.value)}
          placeholder="Enter task"
        />
        <button onClick={addTask}>Add</button>

        <ul>
          {tasks.map((t, index) => (
            <li key={index}>
              {t}
              <button
                className="delete"
                onClick={() => deleteTask(index)}
              >
                X
              </button>
            </li>
          ))}
        </ul>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<TodoApp />);
</script>

</body>
</html>
